<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Appointment — MediCare</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<nav class="navbar">
  <a href="../index.html" class="navbar-brand"><div class="brand-icon">➕</div>MediCare</a>
  <ul class="nav-links">
    <li><a href="../index.html">Home</a></li>
    <li><a href="../about.html">About</a></li>
    <li><a href="../services.html">Services</a></li>
    <li><a href="../partners.html">Partners</a></li>
    <li><a href="../contact.html">Contact</a></li>
    <li><a href="book-appointment.html">Book Appointment</a></li>
  </ul>
  <div class="nav-actions" id="navActions">
    <button id="themeToggle" class="theme-toggle" onclick="toggleTheme()">🌙</button>
  </div>
</nav>

<div class="dashboard-layout">
  <aside class="sidebar">
    <div class="sidebar-title">Patient Dashboard</div>
    <ul class="sidebar-nav">
      <li><a href="dashboard.html"><span class="nav-icon">🌐</span> Dashboard</a></li>
      <li><a href="book-appointment.html" class="active"><span class="nav-icon">📅</span> Book Appointment</a></li>
      <li><a href="ai-recommendation.html"><span class="nav-icon">🤖</span> AI Recommendations</a></li>
      <li><a href="appointments.html"><span class="nav-icon">📋</span> My Appointments</a></li>
      <li><a href="medications.html"><span class="nav-icon">💊</span> My Medications</a></li>
      <li style="margin-top:auto; padding-top:2rem;"><a href="#" onclick="logout()"><span class="nav-icon">🚪</span> Logout</a></li>
    </ul>
  </aside>

  <main class="dashboard-content">
    <div class="dashboard-header">
      <div><h1>📅 Book New Appointment</h1></div>
    </div>

    <div id="bookAlert"></div>

    <div class="book-form-card">
      <div class="book-form-header">📋 Appointment Details</div>
      <div class="book-form-body">
        <form onsubmit="handleBook(event)">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Select Doctor</label>
              <div class="select-wrap">
                <select id="doctorSelect" class="role-select" required>
                  <option value="">Choose a doctor...</option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Preferred Date & Time</label>
              <input type="datetime-local" id="datetime" class="form-control" required>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Reason for Visit</label>
            <textarea id="reason" class="form-control" rows="3" placeholder="Please describe the reason for your visit..." required style="resize:vertical;"></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Symptoms (Optional)</label>
            <textarea id="symptoms" class="form-control" rows="3" placeholder="Describe any symptoms you're experiencing..." style="resize:vertical;"></textarea>
          </div>
          <button type="submit" class="btn btn-primary btn-full btn-lg">📅 Book Appointment</button>
        </form>
      </div>
    </div>

    <div class="book-form-card">
      <div class="book-form-header">👨‍⚕️ Available Doctors</div>
      <div class="book-form-body">
        <div class="available-doctors-grid" id="doctorsList"></div>
      </div>
    </div>
  </main>
</div>

<script src="../js/app.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    requireAuth();
    updateNav();

    // Pre-set min date to now
    const dtInput = document.getElementById('datetime');
    dtInput.min = new Date().toISOString().slice(0,16);

    // Populate doctor select
    const sel = document.getElementById('doctorSelect');
    DOCTORS.forEach(d => {
      const opt = document.createElement('option');
      opt.value = d.name;
      opt.textContent = `${d.name} — ${d.specialty}`;
      sel.appendChild(opt);
    });

    // Pre-select from URL search
    const params = new URLSearchParams(window.location.search);
    const search = params.get('search');
    if (search) {
      const match = DOCTORS.find(d => d.specialty.toLowerCase().includes(search.toLowerCase()) || d.name.toLowerCase().includes(search.toLowerCase()));
      if (match) sel.value = match.name;
    }

    // Render doctors grid
    document.getElementById('doctorsList').innerHTML = DOCTORS.map(d => `
      <div class="card" style="cursor:pointer;" onclick="selectDoctor('${d.name}')">
        <div class="card-body" style="padding:1.25rem;">
          <div class="d-flex align-center gap-2 mb-2">
            <div style="font-size:1.6rem;">👨‍⚕️</div>
            <div>
              <div style="font-weight:700; font-size:0.95rem;">${d.name}</div>
              <span class="doctor-specialty">${d.specialty}</span>
            </div>
          </div>
          <div style="font-size:0.82rem; color:var(--text-secondary); margin-bottom:0.75rem;">${d.desc}</div>
          <div style="font-size:0.82rem; color:var(--accent); font-weight:600;">Experience: ${d.exp} years</div>
        </div>
      </div>
    `).join('');
  });

  function selectDoctor(name) {
    document.getElementById('doctorSelect').value = name;
    showToast(`Selected ${name}`, 'info');
    document.getElementById('doctorSelect').scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  function handleBook(e) {
    e.preventDefault();
    const doctor = document.getElementById('doctorSelect').value;
    const dt = document.getElementById('datetime').value;
    const reason = document.getElementById('reason').value;
    const symptoms = document.getElementById('symptoms').value;

    const [date, time] = dt.split('T');
    saveAppointment({ doctor, date, time, reason, symptoms });
    showToast('Appointment booked successfully!', 'success');
    document.getElementById('bookAlert').innerHTML = '<div class="alert alert-success">✅ Appointment booked successfully! You will receive a confirmation email.</div>';
    e.target.reset();
    setTimeout(() => window.location.href = 'appointments.html', 1500);
  }
</script>
</body>
</html>
