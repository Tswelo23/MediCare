<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Appointments — MediCare</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<nav class="navbar">
  <a href="../index.html" class="navbar-brand"><div class="brand-icon">➕</div>MediCare</a>
  <ul class="nav-links">
    <li><a href="../index.html">Home</a></li>
    <li><a href="../about.html">About</a></li>
    <li><a href="../services.html">Services</a></li>
    <li><a href="../partners.html">Partners</a></li>
    <li><a href="../contact.html">Contact</a></li>
    <li><a href="book-appointment.html">Book Appointment</a></li>
  </ul>
  <div class="nav-actions" id="navActions">
    <button id="themeToggle" class="theme-toggle" onclick="toggleTheme()">🌙</button>
  </div>
</nav>

<div class="dashboard-layout">
  <aside class="sidebar">
    <div class="sidebar-title">Patient Dashboard</div>
    <ul class="sidebar-nav">
      <li><a href="dashboard.html"><span class="nav-icon">🌐</span> Dashboard</a></li>
      <li><a href="book-appointment.html"><span class="nav-icon">📅</span> Book Appointment</a></li>
      <li><a href="ai-recommendation.html"><span class="nav-icon">🤖</span> AI Recommendations</a></li>
      <li><a href="appointments.html" class="active"><span class="nav-icon">📋</span> My Appointments</a></li>
      <li><a href="medications.html"><span class="nav-icon">💊</span> My Medications</a></li>
      <li style="margin-top:auto; padding-top:2rem;"><a href="#" onclick="logout()"><span class="nav-icon">🚪</span> Logout</a></li>
    </ul>
  </aside>

  <main class="dashboard-content">
    <div class="dashboard-header">
      <div><h1>📋 My Appointments</h1></div>
      <a href="book-appointment.html" class="btn btn-accent">📅 Book New</a>
    </div>

    <!-- Filters -->
    <div class="d-flex gap-1 mb-3" style="flex-wrap:wrap;">
      <button class="btn btn-sm btn-primary" onclick="filterAppts('all')">All</button>
      <button class="btn btn-sm btn-outline" onclick="filterAppts('upcoming')">Upcoming</button>
      <button class="btn btn-sm btn-outline" onclick="filterAppts('completed')">Completed</button>
      <button class="btn btn-sm btn-outline" onclick="filterAppts('cancelled')">Cancelled</button>
    </div>

    <div class="dash-section">
      <div class="dash-section-header">
        <h3>📅 Appointments</h3>
        <span id="apptCount" style="font-size:0.82rem; color:var(--text-muted);">0 appointments</span>
      </div>
      <div class="dash-section-body" id="apptsList"></div>
    </div>
  </main>
</div>

<script src="../js/app.js"></script>
<script>
  let currentFilter = 'all';

  document.addEventListener('DOMContentLoaded', () => {
    requireAuth();
    updateNav();
    renderAppts();
  });

  function filterAppts(f) {
    currentFilter = f;
    document.querySelectorAll('.d-flex .btn').forEach(b => b.className = 'btn btn-sm btn-outline');
    event.target.className = 'btn btn-sm btn-primary';
    renderAppts();
  }

  function renderAppts() {
    const all = getAppointments();
    const filtered = currentFilter === 'all' ? all : all.filter(a => a.status === currentFilter);
    document.getElementById('apptCount').textContent = `${filtered.length} appointment${filtered.length !== 1 ? 's' : ''}`;

    const el = document.getElementById('apptsList');
    if (!filtered.length) {
      el.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📅</div>
          <p>No ${currentFilter === 'all' ? '' : currentFilter} appointments found</p>
          <a href="book-appointment.html" class="btn btn-primary">Book an Appointment</a>
        </div>`;
      return;
    }

    el.innerHTML = filtered.map(a => `
      <div class="appointment-card">
        <span class="appt-icon">📅</span>
        <div class="appt-info">
          <div class="appt-doctor">${a.doctor}</div>
          <div class="appt-detail">${a.date || 'Date TBD'} ${a.time ? 'at ' + a.time : ''} · ${a.reason || 'General visit'}</div>
          ${a.symptoms ? `<div class="appt-detail" style="margin-top:3px;">Symptoms: ${a.symptoms}</div>` : ''}
        </div>
        <div class="d-flex align-center gap-1">
          <span class="appt-status ${a.status}">${a.status}</span>
          ${a.status === 'upcoming' ? `<button class="btn btn-sm" style="background:rgba(239,68,68,0.1);color:var(--danger);" onclick="cancelAppt(${a.id})">Cancel</button>` : ''}
        </div>
      </div>
    `).join('');
  }

  function cancelAppt(id) {
    if (confirm('Cancel this appointment?')) {
      cancelAppointment(id);
      showToast('Appointment cancelled', 'error');
      renderAppts();
    }
  }
</script>
</body>
</html>
