<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — MediCare</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="navbar-brand"><div class="brand-icon">➕</div>MediCare</a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="services.html">Services</a></li>
    <li><a href="partners.html">Partners</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
  <div class="nav-actions" id="navActions">
    <button id="themeToggle" class="theme-toggle" onclick="toggleTheme()">🌙</button>
    <a href="login.html" class="btn-nav btn-nav-outline">Login</a>
    <a href="register.html" class="btn-nav btn-nav-solid">Register</a>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-title">
      <span class="icon">➡️</span>
      <h2>Login</h2>
      <p>Welcome back to MediCare</p>
    </div>

    <div id="loginAlert"></div>

    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <div class="input-icon-wrap">
          <span class="icon">✉️</span>
          <input type="email" id="email" class="form-control" placeholder="your@email.com" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="password-wrap">
          <input type="password" id="password" class="form-control" placeholder="Your password" required>
          <button type="button" class="password-toggle" onclick="togglePassword()">👁️</button>
        </div>
        <div class="form-link"><a href="#">🔑 Forgot your password?</a></div>
      </div>

      <button type="submit" class="btn btn-primary btn-full btn-lg">➡️ Login</button>
    </form>

    <div class="form-divider"><span>or</span></div>
    <div class="form-footer">Don't have an account? <a href="register.html">Create Account</a></div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
  // Show success if redirected from register
  const params = new URLSearchParams(window.location.search);
  if (params.get('registered')) {
    document.getElementById('loginAlert').innerHTML = '<div class="alert alert-success">✅ Registration successful! Please login with your credentials.</div>';
    // Pre-fill email if stored
    const u = localStorage.getItem('medibook_user');
    if (u) {
      const user = JSON.parse(u);
      if (user.email) document.getElementById('email').value = user.email;
    }
    // Clear user so they must log in again
    localStorage.removeItem('medibook_user');
  }

  function togglePassword() {
    const inp = document.getElementById('password');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }

  function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const alertEl = document.getElementById('loginAlert');

    // Accept any email/password for demo
    const user = { email, firstName: email.split('@')[0], role: 'patient' };
    localStorage.setItem('medibook_user', JSON.stringify(user));
    showToast('Logged in successfully!', 'success');
    setTimeout(() => window.location.href = 'patient/dashboard.html', 800);
  }
</script>
</body>
</html>
